<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Exam Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9F6F0; --sage: #96AC8F; --dark: #222; --border: #E0E0E0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        header { width: 100%; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .title { font-size: 2.2rem; font-weight: 700; margin: 5px 0; letter-spacing: -0.5px; font-family: serif; }
        .topic-group { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px; }
        .group-label { font-size: 0.8rem; color: #888; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
        .topic-item { width: 100%; background: white; border: 1px solid var(--border); padding: 16px 20px; border-radius: 12px; margin-bottom: 10px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; transition: all 0.2s ease; font-weight: 500; }
        .topic-item:hover { border-color: var(--sage); background: #FCFAF7; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; width: 100%; }
        
        #question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #111; word-break: break-word; white-space: pre-wrap; font-family: serif;}
        .q-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 12px; margin-bottom: 20px; display: none; background: #fff; }
        
        .option-btn { width: 100%; background: #fff; border: 1.5px solid var(--border); padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; text-align: left; cursor: pointer; font-size: 1.05rem; line-height: 1.4; color: #333; transition: all 0.2s; display: block; box-sizing: border-box; }
        .option-btn:hover { border-color: var(--sage); background: #f9fdfa; }
        .correct { background: var(--sage) !important; color: white !important; border-color: var(--sage) !important; font-weight: 600; }
        .wrong { background: #E57373 !important; color: white !important; border-color: #E57373 !important; }
        
        .text-input { width: 100%; padding: 16px 20px; border: 2px solid var(--border); border-radius: 12px; font-size: 1.1rem; font-family: inherit; margin-bottom: 15px; box-sizing: border-box; transition: 0.2s; }
        .text-input:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(150, 172, 143, 0.2); }
        .submit-btn { width: 100%; background: var(--sage); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: 600; font-size: 1.05rem; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #7c9376; }

        .explanation { background: #F4F7F2; padding: 20px; border-radius: 16px; font-size: 0.95rem; margin-top: 20px; display: none; line-height: 1.6; border-left: 5px solid var(--sage); color: #444; }
        .next-btn { width: 100%; background: var(--dark); color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; display: none; font-size: 1.05rem; letter-spacing: 0.5px; }
        .hidden { display: none !important; }
        .score-box { text-align: center; padding: 50px 20px; }

        /* โซนจับเวลา */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer-badge { background: #fff; border: 2px solid var(--border); padding: 6px 14px; border-radius: 20px; font-family: monospace; font-size: 1.1rem; font-weight: 700; color: var(--dark); transition: 0.3s; }
        
        /* โซนป๊อบอัป Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card { background: white; width: 90%; max-width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; }
        .modal-title { font-size: 1.4rem; font-weight: 700; margin-top: 0; color: var(--dark); font-family: serif; }
        .modal-text { font-size: 1rem; color: #555; line-height: 1.5; margin-bottom: 25px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-primary { background: var(--sage); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; flex: 1; font-size: 1rem; }
        .btn-secondary { background: #eee; color: #333; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; flex: 1; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 0.75rem; color: #999; letter-spacing: 1.5px; font-weight: 600;">BIOLOGY EXAM HUB</div>
            <div class="title" id="page-title">Contents</div>
        </header>

        <div id="dashboard">
            <div class="topic-group">
                <div class="group-label">Chapters (แยกตามบทเรียน)</div>
                <div id="chapter-list"></div>
            </div>
            
            <div class="topic-group">
                <div class="group-label">A-Level Past Papers (ปี 65-69)</div>
                <div id="yearly-list"></div>
            </div>

            <div class="topic-group">
                <div class="group-label">Master Quizzes (สุ่มรวม)</div>
                <div id="mixed-quiz-list"></div>
            </div>
        </div>

        <div id="quiz-area" class="hidden">
            <div class="header-row">
                <div class="timer-badge" id="quiz-timer">00:00</div>
                <div style="font-size: 0.85rem; color: #888; font-weight: 600;" id="progress-text"></div>
            </div>
            <div class="card">
                <img id="question-img" class="q-image" src="" alt="Question Image">
                <div id="question-text"></div>
                <div id="options-list"></div>
                <div id="explanation-box" class="explanation"><strong style="color: var(--sage);">EXPLANATION</strong><br><span id="explanation-text"></span></div>
            </div>
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">NEXT QUESTION</button>
            <button onclick="goBackToMenu()" style="background:none; border:none; color:#AAA; width:100%; margin-top:30px; cursor:pointer; font-weight:600; font-size:0.85rem;">← BACK TO MENU</button>
        </div>

        <div id="result-area" class="hidden card score-box">
            <h2 style="margin:0; font-size: 2rem;">Quiz Completed!</h2>
            <div style="font-size: 4rem; color: var(--sage); margin: 20px 0; font-weight: 700;" id="final-score"></div>
            <button class="next-btn" style="display:block; background:var(--sage);" onclick="goBackToMenu()">← BACK TO MENU</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title" class="modal-title">Title</h3>
            <p id="modal-text" class="modal-text">Message</p>
            <div class="modal-buttons">
                <button id="modal-btn-2" class="btn-secondary">Option 2</button>
                <button id="modal-btn-1" class="btn-primary">Option 1</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            chapters: [
                {id:"intro", name:"1. บทนำชีววิทยา"}, {id:"chem", name:"2. เคมีพื้นฐาน"}, {id:"scope", name:"3. กล้องจุลทรรศน์"},
                {id:"cell", name:"4. โครงสร้างเซลล์"}, {id:"transport", name:"5. การลำเลียงสาร"}, {id:"division", name:"6. การแบ่งเซลล์"},
                {id:"respi", name:"7. การหายใจระดับเซลล์"}, {id:"mol_gen", name:"8. พันธุศาสตร์โมเลกุล"}, {id:"mendel", name:"9. พันธุศาสตร์เมนเดล"},
                {id:"dna_tech", name:"10. เทคโนโลยีดีเอ็นเอ"}, {id:"evolution", name:"11. วิวัฒนาการ"}, {id:"digest", name:"12. ระบบย่อยอาหาร"},
                {id:"resp_sys", name:"13. ระบบหายใจ"}, {id:"heart", name:"14. ระบบไหลเวียนเลือด"}, {id:"immune", name:"15. ระบบภูมิคุ้มกัน"},
                {id:"excrete", name:"16. ระบบขับถ่าย"}, {id:"nerve", name:"17. ระบบประสาท"}, {id:"locomotion", name:"18. การเคลื่อนที่"},
                {id:"hormone", name:"19. ระบบต่อมไร้ท่อ"}, {id:"repro_ani", name:"20. การสืบพันธุ์สัตว์"}, {id:"behavior", name:"21. พฤติกรรมสัตว์"},
                {id:"plant_struc", name:"22. โครงสร้างพืช"}, {id:"plant_trans", name:"23. การลำเลียงของพืช"}, {id:"photo", name:"24. การสังเคราะห์ด้วยแสง"},
                {id:"plant_repro", name:"25. การสืบพันธุ์พืชดอก"}, {id:"plant_hormone", name:"26. ฮอร์โมนพืช"}, {id:"taxonomy", name:"27. ความหลากหลาย"},
                {id:"ecology", name:"28. ระบบนิเวศ"}
            ],
            years: [
                {id:"year_65", name:"A-Level 65"}, {id:"year_66", name:"A-Level 66"}, 
                {id:"year_67", name:"A-Level 67"}, {id:"year_68", name:"A-Level 68"}, {id:"year_69", name:"A-Level 69"}
            ]
        };

        let questions = [], currentIndex = 0, score = 0, currentQuizName = "", quizType = "";
        let timerInterval = null, timeSeconds = 0, isCountdown = false;

        // ระบบควบคุม Modal (แทน alert / confirm)
        function showModal(title, text, btn1Text, btn1Cb, btn2Text = null, btn2Cb = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            
            const btn1 = document.getElementById('modal-btn-1');
            const btn2 = document.getElementById('modal-btn-2');
            
            btn1.innerText = btn1Text;
            btn1.onclick = btn1Cb;
            
            if (btn2Text) {
                btn2.style.display = 'block';
                btn2.innerText = btn2Text;
                btn2.onclick = btn2Cb;
            } else {
                btn2.style.display = 'none';
            }
            
            document.getElementById('custom-modal').classList.add('active');
        }

        function hideModal() {
            document.getElementById('custom-modal').classList.remove('active');
        }

        function init() {
            const chapList = document.getElementById('chapter-list');
            config.chapters.forEach(c => {
                const item = document.createElement('div'); item.className = 'topic-item';
                item.innerHTML = `<span>${c.name}</span><span style="color:#CCC">→</span>`;
                item.onclick = () => handleQuizClick(c.id, c.name, 'chapter'); chapList.appendChild(item);
            });

            const yearList = document.getElementById('yearly-list');
            config.years.forEach(y => {
                const item = document.createElement('div'); item.className = 'topic-item';
                item.innerHTML = `<span>${y.name}</span><span style="color:#CCC">→</span>`;
                item.onclick = () => handleQuizClick(y.id, y.name, 'exam'); yearList.appendChild(item);
            });

            const mixedList = document.getElementById('mixed-quiz-list');
            for(let i=1; i<=10; i++) {
                const item = document.createElement('div'); item.className = 'topic-item';
                item.innerHTML = `<span>Master Quiz Set ${i}</span><span style="color:#CCC">→</span>`;
                item.onclick = () => handleQuizClick('all_questions', `Master Quiz Set ${i}`, 'master'); mixedList.appendChild(item);
            }

            // ถ้าเผลอรีเฟรชหน้า ดึงของเก่ากลับมาอัตโนมัติ
            const savedState = sessionStorage.getItem('bioQuizState');
            if (savedState) {
                const state = JSON.parse(savedState);
                if (state.isActive && state.currentIndex < state.questions.length) {
                    resumeQuiz(state);
                }
            }
        }

        function handleQuizClick(id, name, type) {
            const savedState = sessionStorage.getItem('bioQuizState');
            if (savedState) {
                const state = JSON.parse(savedState);
                // เช็คว่าเคยกดทำค้างไว้ไหม
                if (state.quizName === name && state.currentIndex < state.questions.length) {
                    showModal(
                        "มีข้อสอบค้างอยู่!",
                        `คุณทำชุด "${name}" ค้างไว้ ต้องการทำต่อจากเดิม หรือเริ่มทำใหม่ตั้งแต่ข้อแรกครับ?`,
                        "ทำต่อ", () => { hideModal(); resumeQuiz(state); },
                        "เริ่มใหม่", () => { hideModal(); startNewQuizLoad(id, name, type); }
                    );
                    return;
                }
            }
            startNewQuizLoad(id, name, type);
        }

        async function startNewQuizLoad(id, name, type) {
            try {
                const res = await fetch(`${id}.json?t=${new Date().getTime()}`);
                if (!res.ok) throw new Error();
                let fetchedQuestions = await res.json();
                
                // ถ้าเป็น Master สุ่มมาแค่ 40 ข้อ
                if (type === 'master') {
                    fetchedQuestions = fetchedQuestions.sort(() => Math.random() - 0.5).slice(0, 40);
                } else {
                    fetchedQuestions = fetchedQuestions.sort(() => Math.random() - 0.5);
                }
                
                questions = fetchedQuestions;
                currentIndex = 0; 
                score = 0; 
                currentQuizName = name;
                quizType = type;
                
                // ตั้งค่าเวลา
                if (type === 'exam' || type === 'master') {
                    isCountdown = true;
                    timeSeconds = 90 * 60; // 90 นาที
                } else {
                    isCountdown = false;
                    timeSeconds = 0; // เริ่มจาก 0 นับเดินหน้า
                }
                
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('quiz-area').classList.remove('hidden');
                document.getElementById('page-title').innerText = name;
                
                saveProgress(true);
                startTimer();
                showQuestion();

            } catch (e) { 
                showModal("หาไฟล์ไม่พบ", `ระบบยังหาไฟล์ ${id}.json ไม่เจอ หรือข้อมูลในไฟล์มีข้อผิดพลาดครับ`, "ตกลง", hideModal);
            }
        }

        function resumeQuiz(state) {
            questions = state.questions;
            currentIndex = state.currentIndex;
            score = state.score;
            currentQuizName = state.quizName;
            quizType = state.quizType;
            timeSeconds = state.timeSeconds || 0;
            isCountdown = (quizType === 'exam' || quizType === 'master');
            
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('page-title').innerText = currentQuizName;
            
            startTimer();
            showQuestion();
        }

        // ระบบจับเวลา
        function startTimer() {
            clearInterval(timerInterval);
            renderTime();
            timerInterval = setInterval(() => {
                if (isCountdown) {
                    timeSeconds--;
                    if (timeSeconds <= 0) {
                        clearInterval(timerInterval);
                        timeSeconds = 0;
                        renderTime();
                        showModal("หมดเวลา!", "หมดเวลาทำข้อสอบแล้วครับ ระบบได้ทำการส่งข้อสอบของคุณเรียบร้อยแล้ว", "ดูผลสอบ", () => {
                            hideModal();
                            finishQuiz();
                        });
                        return;
                    }
                } else {
                    timeSeconds++;
                }
                renderTime();
                
                // แอบเซฟเวลาทุกๆ 5 วินาที กันรีเฟรชหน้า
                if (timeSeconds % 5 === 0) saveProgress(true);
            }, 1000);
        }

        function renderTime() {
            const m = Math.floor(timeSeconds / 60).toString().padStart(2, '0');
            const s = (timeSeconds % 60).toString().padStart(2, '0');
            const timerEl = document.getElementById('quiz-timer');
            timerEl.innerText = `${m}:${s}`;
            
            // เตือนเมื่อเหลือน้อยกว่า 5 นาที ในโหมดจับเวลา
            if (isCountdown && timeSeconds < 300) { 
                timerEl.style.color = "#E57373";
                timerEl.style.borderColor = "#E57373";
            } else {
                timerEl.style.color = "var(--dark)";
                timerEl.style.borderColor = "var(--border)";
            }
        }

        function saveProgress(isActive = true) {
            const state = { questions, currentIndex, score, quizName: currentQuizName, quizType, timeSeconds, isActive };
            sessionStorage.setItem('bioQuizState', JSON.stringify(state));
        }

        function goBackToMenu() {
            clearInterval(timerInterval);
            if (currentIndex < questions.length) {
                saveProgress(false); // เซฟว่าทำค้างไว้
            } else {
                sessionStorage.removeItem('bioQuizState'); // ทำเสร็จแล้ว ล้างเซฟทิ้ง
            }
            
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('page-title').innerText = "Contents";
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            sessionStorage.removeItem('bioQuizState'); 
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progress-text').innerText = `Q: ${currentIndex + 1} / ${questions.length}`;
            
            const img = document.getElementById('question-img');
            if(q.img) { img.src = q.img; img.style.display = 'block'; } else { img.style.display = 'none'; }
            
            document.getElementById('question-text').innerText = q.q;
            const optDiv = document.getElementById('options-list'); 
            optDiv.innerHTML = '';
            
            if (q.opt && q.opt.length > 0) {
                q.opt.forEach((o, i) => {
                    const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o;
                    b.onclick = () => {
                        const btns = document.querySelectorAll('.option-btn');
                        btns.forEach(btn => btn.onclick = null);
                        if(i === q.ans) { b.classList.add('correct'); score++; }
                        else { b.classList.add('wrong'); btns[q.ans].classList.add('correct'); }
                        showExplanation(q.exp);
                    };
                    optDiv.appendChild(b);
                });
            } else {
                optDiv.innerHTML = `
                    <input type="text" id="type-answer" class="text-input" placeholder="พิมพ์คำตอบของคุณที่นี่..." autocomplete="off">
                    <button class="submit-btn" onclick="checkTypedAnswer()">ส่งคำตอบ</button>
                `;
                document.getElementById('type-answer').addEventListener("keypress", function(event) {
                    if (event.key === "Enter") checkTypedAnswer();
                });
            }

            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkTypedAnswer() {
            const inputEl = document.getElementById('type-answer');
            if(!inputEl.value.trim()) return; 
            
            const userAnswer = inputEl.value.trim().replace(/\s+/g, '').toLowerCase();
            const q = questions[currentIndex];
            
            let isCorrect = false;
            const correctAnswers = Array.isArray(q.ans) ? q.ans : [q.ans.toString()];
            
            correctAnswers.forEach(ans => {
                if (userAnswer === ans.replace(/\s+/g, '').toLowerCase()) {
                    isCorrect = true;
                }
            });

            inputEl.disabled = true;
            document.querySelector('.submit-btn').style.display = 'none';

            if (isCorrect) {
                inputEl.style.borderColor = "var(--sage)";
                inputEl.style.backgroundColor = "#eaf2eb";
                score++;
            } else {
                inputEl.style.borderColor = "#E57373";
                inputEl.style.backgroundColor = "#fdeaea";
            }

            showExplanation(q.exp);
        }

        function showExplanation(expText) {
            document.getElementById('explanation-text').innerText = expText || "ไม่มีคำอธิบายเพิ่มเติม";
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < questions.length) {
                saveProgress(true);
                showQuestion();
            } else {
                finishQuiz();
            }
        }
        
        init();
    </script>
</body>
</html>
