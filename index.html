<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Exam Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F9F6F0; --sage: #96AC8F; --dark: #222; --border: #E0E0E0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        header { width: 100%; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .title { font-size: 2rem; font-weight: 700; margin: 5px 0; letter-spacing: -0.5px; }
        .topic-group { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px; }
        .group-label { font-size: 0.8rem; color: #888; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
        .topic-item { width: 100%; background: white; border: 1px solid var(--border); padding: 16px 20px; border-radius: 12px; margin-bottom: 10px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; transition: all 0.2s ease; font-weight: 500; }
        .topic-item:hover { border-color: var(--sage); background: #FCFAF7; transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.04); box-sizing: border-box; width: 100%; }
        
        /* แก้ปัญหาฟอนต์และการตัดคำ */
        #question-text { font-size: 1.2rem; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #111; word-break: break-word; white-space: pre-wrap; }
        
        .q-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 12px; margin-bottom: 20px; display: none; background: #fff; }
        
        /* สไตล์ของปุ่มช้อยส์ และ ช่องพิมพ์คำตอบ */
        .option-btn { width: 100%; background: #fff; border: 1.5px solid var(--border); padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; text-align: left; cursor: pointer; font-size: 1.05rem; line-height: 1.4; color: #333; transition: all 0.2s; display: block; box-sizing: border-box; }
        .option-btn:hover { border-color: var(--sage); background: #f9fdfa; }
        .correct { background: var(--sage) !important; color: white !important; border-color: var(--sage) !important; font-weight: 600; }
        .wrong { background: #E57373 !important; color: white !important; border-color: #E57373 !important; }
        
        .text-input { width: 100%; padding: 16px 20px; border: 2px solid var(--border); border-radius: 12px; font-size: 1.1rem; font-family: inherit; margin-bottom: 15px; box-sizing: border-box; transition: 0.2s; }
        .text-input:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(150, 172, 143, 0.2); }
        .submit-btn { width: 100%; background: var(--sage); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: 600; font-size: 1.05rem; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #7c9376; }

        .explanation { background: #F4F7F2; padding: 20px; border-radius: 16px; font-size: 0.95rem; margin-top: 20px; display: none; line-height: 1.6; border-left: 5px solid var(--sage); color: #444; }
        .next-btn { width: 100%; background: var(--dark); color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; display: none; font-size: 1.05rem; letter-spacing: 0.5px; }
        .hidden { display: none; }
        .score-box { text-align: center; padding: 50px 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 0.75rem; color: #999; letter-spacing: 1.5px; font-weight: 600;">BIOLOGY EXAM HUB</div>
            <div class="title" id="page-title">Contents</div>
        </header>

        <div id="dashboard">
            <div class="topic-group">
                <div class="group-label">Chapters (แยกตามบทเรียน)</div>
                <div id="chapter-list"></div>
            </div>
            
            <div class="topic-group">
                <div class="group-label">A-Level Past Papers (ปี 65-69)</div>
                <div id="yearly-list"></div>
            </div>

            <div class="topic-group">
                <div class="group-label">Master Quizzes (สุ่มรวม)</div>
                <div id="mixed-quiz-list"></div>
            </div>
        </div>

        <div id="quiz-area" class="hidden">
            <div style="font-size: 0.85rem; color: #888; margin-bottom: 12px; text-align: right; font-weight: 600;" id="progress-text"></div>
            <div class="card">
                <img id="question-img" class="q-image" src="" alt="Question Image">
                <div id="question-text"></div>
                <div id="options-list"></div>
                <div id="explanation-box" class="explanation"><strong style="color: var(--sage);">EXPLANATION</strong><br><span id="explanation-text"></span></div>
            </div>
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">NEXT QUESTION</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#AAA; width:100%; margin-top:30px; cursor:pointer; font-weight:600; font-size:0.85rem;">← BACK TO CONTENTS</button>
        </div>

        <div id="result-area" class="hidden card score-box">
            <h2 style="margin:0; font-size: 2rem;">Quiz Completed!</h2>
            <div style="font-size: 4rem; color: var(--sage); margin: 20px 0; font-weight: 700;" id="final-score"></div>
            <button class="next-btn" style="display:block; background:var(--sage);" onclick="location.reload()">BACK TO MENU</button>
        </div>
    </div>

    <script>
        const config = {
            chapters: [ 
                {id:"intro", name:"1. บทนำชีววิทยา"},
                {id:"chem", name:"2. เคมีพื้นฐานของสิ่งมีชีวิต"},
                {id:"cell", name:"3. โครงสร้างและหน้าที่ของเซลล์"}
            ],
            years: [ {id:"year_65", name:"A-Level 65"}, {id:"year_66", name:"A-Level 66"} ]
        };

        let questions = [], currentIndex = 0, score = 0;

        function init() {
            const chapList = document.getElementById('chapter-list');
            config.chapters.forEach(c => {
                const item = document.createElement('div'); item.className = 'topic-item';
                item.innerHTML = `<span>${c.name}</span><span style="color:#CCC">→</span>`;
                item.onclick = () => loadFile(c.id, c.name); chapList.appendChild(item);
            });
            const yearList = document.getElementById('yearly-list');
            config.years.forEach(y => {
                const item = document.createElement('div'); item.className = 'topic-item';
                item.innerHTML = `<span>${y.name}</span><span style="color:#CCC">→</span>`;
                item.onclick = () => loadFile(y.id, y.name); yearList.appendChild(item);
            });
        }

        async function loadFile(id, name) {
            try {
                const res = await fetch(`${id}.json?t=${new Date().getTime()}`);
                if (!res.ok) throw new Error();
                questions = (await res.json()).sort(() => Math.random() - 0.5);
                startQuiz(name);
            } catch (e) { alert("กำลังอัปเดตไฟล์ " + id + ".json ครับ"); }
        }

        function startQuiz(name) {
            currentIndex = 0; score = 0;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('page-title').innerText = name;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progress-text').innerText = `Q: ${currentIndex + 1} / ${questions.length}`;
            
            const img = document.getElementById('question-img');
            if(q.img) { img.src = q.img; img.style.display = 'block'; } else { img.style.display = 'none'; }
            
            document.getElementById('question-text').innerText = q.q;
            const optDiv = document.getElementById('options-list'); 
            optDiv.innerHTML = '';
            
            // เช็คว่ามีช้อยส์ไหม ถ้ามี สร้างปุ่ม
            if (q.opt && q.opt.length > 0) {
                q.opt.forEach((o, i) => {
                    const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o;
                    b.onclick = () => {
                        const btns = document.querySelectorAll('.option-btn');
                        btns.forEach(btn => btn.onclick = null);
                        if(i === q.ans) { b.classList.add('correct'); score++; }
                        else { b.classList.add('wrong'); btns[q.ans].classList.add('correct'); }
                        showExplanation(q.exp);
                    };
                    optDiv.appendChild(b);
                });
            } 
            // ถ้าไม่มีช้อยส์ สร้างช่องให้พิมพ์คำตอบ
            else {
                optDiv.innerHTML = `
                    <input type="text" id="type-answer" class="text-input" placeholder="พิมพ์คำตอบของคุณที่นี่..." autocomplete="off">
                    <button class="submit-btn" onclick="checkTypedAnswer()">ส่งคำตอบ</button>
                `;
                // กด Enter เพื่อส่งคำตอบได้
                document.getElementById('type-answer').addEventListener("keypress", function(event) {
                    if (event.key === "Enter") checkTypedAnswer();
                });
            }

            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkTypedAnswer() {
            const inputEl = document.getElementById('type-answer');
            const userAnswer = inputEl.value.trim().replace(/\\s+/g, '').toLowerCase(); // ลบช่องว่างออกหมดเวลาตรวจ
            const q = questions[currentIndex];
            
            // ทำให้รองรับคำตอบที่ถูกได้หลายแบบ (เช่น เป็น Array)
            let isCorrect = false;
            const correctAnswers = Array.isArray(q.ans) ? q.ans : [q.ans.toString()];
            
            correctAnswers.forEach(ans => {
                if (userAnswer === ans.replace(/\\s+/g, '').toLowerCase()) {
                    isCorrect = true;
                }
            });

            inputEl.disabled = true;
            document.querySelector('.submit-btn').style.display = 'none';

            if (isCorrect) {
                inputEl.style.borderColor = "var(--sage)";
                inputEl.style.backgroundColor = "#eaf2eb";
                score++;
            } else {
                inputEl.style.borderColor = "#E57373";
                inputEl.style.backgroundColor = "#fdeaea";
            }

            showExplanation(q.exp);
        }

        function showExplanation(expText) {
            document.getElementById('explanation-text').innerText = expText || "ไม่มีคำอธิบายเพิ่มเติม";
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < questions.length) showQuestion();
            else {
                document.getElementById('quiz-area').classList.add('hidden');
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            }
        }
        init();
    </script>
</body>
</html>
